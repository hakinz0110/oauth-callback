<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deriv OAuth Callback</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .icon {
            font-size: 60px;
            text-align: center;
            margin-bottom: 20px;
            animation: bounce 1s ease infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        p {
            color: #7f8c8d;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .status {
            background: #ecf0f1;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 14px;
            color: #2c3e50;
        }
        .status-item {
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
        }
        .label { font-weight: bold; }
        .value { color: #27ae60; }
        .error { color: #e74c3c; }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .button:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon" id="icon">🔄</div>
        <h1 id="title">Processing Authorization...</h1>
        <p id="message">Sending credentials to your trading bot...</p>
        
        <div class="status" id="status">
            <div class="status-item">
                <span class="label">Status:</span>
                <span class="value" id="statusText">Connecting...</span>
            </div>
        </div>
        
        <div class="spinner" id="spinner"></div>
        
        <button class="button" id="retryBtn" style="display:none;" onclick="retry()">
            🔄 Retry Connection
        </button>
    </div>

    <script>
        // Extract OAuth callback parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');
        const error = urlParams.get('error');
        const errorDesc = urlParams.get('error_description');

        // Update UI
        const icon = document.getElementById('icon');
        const title = document.getElementById('title');
        const message = document.getElementById('message');
        const statusText = document.getElementById('statusText');
        const spinner = document.getElementById('spinner');
        const retryBtn = document.getElementById('retryBtn');

        // Check for errors first
        if (error) {
            icon.textContent = '❌';
            title.textContent = 'Authorization Failed';
            message.textContent = errorDesc || 'An error occurred during authorization';
            statusText.textContent = error;
            statusText.className = 'error';
            spinner.style.display = 'none';
            return;
        }

        // Check if we have the authorization code
        if (!code) {
            icon.textContent = '⚠️';
            title.textContent = 'Invalid Callback';
            message.textContent = 'No authorization code received from Deriv';
            statusText.textContent = 'Missing code parameter';
            statusText.className = 'error';
            spinner.style.display = 'none';
            return;
        }

        // Try to send authorization code to local bot
        async function sendToLocalBot() {
            try {
                statusText.textContent = 'Connecting to local bot...';
                
                // Try to reach local Flask server
                const response = await fetch('http://127.0.0.1:5000/oauth/callback?' + urlParams.toString(), {
                    method: 'GET',
                    mode: 'no-cors', // Required for localhost from HTTPS page
                });

                // Since we're using no-cors, we can't check response status
                // Assume success after 2 seconds
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                icon.textContent = '✅';
                title.textContent = 'Authorization Successful!';
                message.textContent = 'Your trading bot is now authenticated and starting...';
                statusText.textContent = 'Connected';
                statusText.className = 'value';
                spinner.style.display = 'none';
                
                // Show close instruction
                setTimeout(() => {
                    message.textContent = 'You can close this window and return to your terminal.';
                }, 2000);
                
            } catch (err) {
                console.error('Connection error:', err);
                
                // Show manual fallback
                icon.textContent = '📋';
                title.textContent = 'Manual Step Required';
                message.innerHTML = `
                    Your bot couldn't be reached automatically.<br><br>
                    <strong>Copy the URL below and paste it into your terminal:</strong>
                `;
                
                const callbackUrl = window.location.href;
                document.getElementById('status').innerHTML = `
                    <div style="margin: 20px 0;">
                        <textarea readonly style="
                            width: 100%; 
                            height: 100px; 
                            padding: 10px; 
                            border: 2px solid #667eea;
                            border-radius: 8px;
                            font-family: monospace;
                            font-size: 12px;
                            resize: none;
                        " onclick="this.select()">${callbackUrl}</textarea>
                    </div>
                    <button class="button" onclick="navigator.clipboard.writeText('${callbackUrl}'); alert('Copied to clipboard!')">
                        📋 Copy URL to Clipboard
                    </button>
                `;
                
                spinner.style.display = 'none';
                statusText.textContent = 'Connection failed';
                statusText.className = 'error';
                retryBtn.style.display = 'block';
            }
        }

        function retry() {
            location.reload();
        }

        // Start the process
        sendToLocalBot();
    </script>
</body>
</html>
